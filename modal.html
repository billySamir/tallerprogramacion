<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Modal Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow: hidden; /* Evitar scroll innecesario */
        }
        
        .gradient-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .modal-overlay {
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-container {
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-container {
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

    <!-- Barra de Navegación superior derecha (Referencia image_1e8e97.png) -->
    <header class="fixed top-0 left-0 w-full z-40 px-8 py-8">
        <nav class="max-w-7xl mx-auto flex justify-end items-center space-x-6 md:space-x-8 text-sm md:text-base font-medium tracking-wide">
            <a href="index.html" class="text-cyan-400 hover:brightness-125 transition-all">Inicio</a>
            <a href="portafolio.html" class="text-white/80 hover:text-white transition-all">Portafolio</a>
            <a href="portafio2.html" class="text-white/80 hover:text-white transition-all">Portafolio 2</a>
            <a href="modal.html" class="text-white/60 hover:text-white transition-all">Modal V1</a>
            <a href="modal2.html" class="text-white/60 hover:text-white transition-all">Modal v2</a>
            <a href="#" class="text-white hover:text-white transition-all border border-white/20 px-4 py-2 rounded-full hover:bg-white/10">Contacto</a>
        </nav>
    </header>

    <main class="text-center z-10">
        <!-- Botón Disparador Original -->
        <button 
            id="abrirModal" 
            class="group relative inline-flex items-center justify-center px-10 py-5 font-bold text-white transition-all duration-300 bg-slate-900 rounded-2xl hover:bg-black hover:scale-105 focus:outline-none focus:ring-4 focus:ring-indigo-500/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)] active:scale-95"
        >
            <span class="text-lg">Ver Novedades</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-3 group-hover:translate-x-1 transition-transform text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </button>
    </main>

    <!-- Estructura del Modal con info original -->
    <div 
        id="miModal" 
        class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md"
        role="dialog"
        aria-modal="true"
    >
        <div class="modal-container bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden relative">
            
            <!-- Botón Cerrar (X) -->
            <button 
                id="cerrarModalX"
                class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 hover:bg-slate-100 p-2 rounded-xl transition-all"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div class="p-10 flex flex-col items-center text-center">
                <!-- Icono Dinámico -->
                <div class="relative mb-8">
                    <div class="absolute inset-0 bg-indigo-500 blur-3xl opacity-20 rounded-full"></div>
                    <div class="relative flex items-center justify-center h-20 w-20 rounded-3xl bg-indigo-600 text-white shadow-xl rotate-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                </div>

                <h2 class="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">
                    ¿Qué hay de nuevo?
                </h2>
                
                <p class="text-slate-500 text-lg leading-relaxed mb-10 px-4">
                    Hemos integrado una nueva <span class="font-semibold text-indigo-600">Inteligencia Artificial</span> para asistirte en tus tareas, además de mejorar la velocidad de carga en un <span class="font-bold text-slate-800 italic">40%</span>.
                </p>

                <!-- Botones de Acción -->
                <div class="grid grid-cols-2 gap-4 w-full">
                    <button 
                        id="botonCerrarSecundario"
                        class="px-6 py-4 bg-slate-50 text-slate-600 font-bold rounded-2xl hover:bg-slate-100 transition-colors border border-slate-200"
                    >
                        Después
                    </button>
                    <button 
                        id="botonAccion"
                        class="px-6 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all hover:-translate-y-1"
                    >
                        ¡Entendido!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('miModal');
        const btnAbrir = document.getElementById('abrirModal');
        const btnsCerrar = [
            document.getElementById('cerrarModalX'),
            document.getElementById('botonCerrarSecundario'),
            document.getElementById('botonAccion')
        ];

        function openModal() {
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        btnAbrir.addEventListener('click', openModal);
        
        btnsCerrar.forEach(btn => {
            btn.addEventListener('click', closeModal);
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
